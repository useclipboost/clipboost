<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio Engine - Premium Short-Form Suite</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #0a0a0f 100%);
    }
    .glass-panel {
      background: rgba(18, 18, 29, 0.65);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.07);
    }
    .active-pill {
      background: rgba(255, 255, 255, 0.09);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
  </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col antialiased">

  <header class="w-full max-w-7xl mx-auto px-6 py-5 flex items-center justify-between border-b border-white/5">
    <div class="flex items-center gap-3">
      <div class="h-9 w-9 bg-gradient-to-tr from-indigo-500 to-emerald-400 rounded-xl flex items-center justify-center font-bold text-black text-lg shadow-lg shadow-indigo-500/20">S</div>
      <span class="text-lg font-bold tracking-tight bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">STUDIO.AI</span>
    </div>
    
    <nav class="flex items-center gap-1 bg-black/40 p-1.5 rounded-full border border-white/5">
      <button class="px-5 py-2 rounded-full text-sm font-semibold active-pill text-white transition-all">Video</button>
      <button class="px-5 py-2 rounded-full text-sm font-medium text-slate-400 hover:text-slate-200 transition-all">Image</button>
      <button class="px-5 py-2 rounded-full text-sm font-medium text-slate-400 hover:text-slate-200 transition-all">Tools</button>
      <button class="px-5 py-2 rounded-full text-sm font-medium text-slate-400 hover:text-slate-200 transition-all">Assets</button>
    </nav>

    <div class="flex items-center gap-4">
      <div class="text-xs bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 px-3 py-1.5 rounded-full font-medium">⚡ 750 Credits</div>
      <div class="h-8 w-8 rounded-full bg-slate-800 border border-white/10 overflow-hidden"></div>
    </div>
  </header>

  <main class="flex-1 max-w-7xl w-full mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 items-stretch">
    
    <div class="lg:col-span-7 flex flex-col gap-5">
      <div class="glass-panel rounded-3xl p-6 flex flex-col flex-1 shadow-2xl relative overflow-hidden">
